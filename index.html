<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Apparel Designer</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-header">
        <h1><i class="fa-solid fa-shirt"></i> StyleStudio Designer</h1>
        <div class="header-actions">
            <button id="exportBtn" class="btn btn-primary" title="Download Design">
                <i class="fa-solid fa-download"></i> Download
            </button>
        </div>
    </div>

    <div class="main-interface">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            
            <!-- Upload Section -->
            <div class="control-group">
                <h3><i class="fa-solid fa-upload"></i> Upload Logo</h3>
                <div class="upload-area" id="dropZone">
                    <i class="fa-solid fa-cloud-arrow-up fa-2x"></i>
                    <p>Drag & Drop or Click to Upload</p>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>
            </div>

            <!-- Properties Section -->
            <div class="control-group" id="propertiesPanel" style="display: none;">
                <h3><i class="fa-solid fa-sliders"></i> Properties</h3>
                
                <div class="property-row">
                    <label>Scale</label>
                    <input type="range" id="scaleSlider" min="0.1" max="3" step="0.1" value="1">
                    <span id="scaleValue">100%</span>
                </div>

                <div class="property-row">
                    <label>Rotation</label>
                    <input type="range" id="rotateSlider" min="0" max="360" step="1" value="0">
                    <span id="rotateValue">0°</span>
                </div>

                <div class="btn-group">
                    <button id="btnBringFront" class="btn btn-secondary"><i class="fa-solid fa-arrow-up"></i> Front</button>
                    <button id="btnSendBack" class="btn btn-secondary"><i class="fa-solid fa-arrow-down"></i> Back</button>
                </div>
            </div>

            <div class="control-group" style="margin-top: auto;">
                <p class="info-text">Tips: <br>
                • Drag Logo to move <br>
                • Scroll to Zoom <br>
                • Hold Space + Drag to Pan</p>
            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="workspace">
            <div id="canvasContainer">
                <div id="resizeHandle" class="resize-handle"></div>
                <canvas id="designCanvas"></canvas>
                
                <!-- Floating Tools Overlay -->
                <div class="tools-overlay">
                    <button id="toolPan" class="tool-btn active" title="Pan Tool (Hold Space)">
                        <i class="fa-solid fa-hand"></i>
                    </button>
                    <button id="toolSelect" class="tool-btn" title="Select Tool">
                        <i class="fa-solid fa-pointer"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
